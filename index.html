<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>For You 🤍</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@200;300;400&display=swap');

        :root {
            --bg-dark: #0a0508;
            --orb-color: #ffb3c6;
            --orb-glow: rgba(255, 179, 198, 0.4);
            --text-light: #f3e5e5;
            --final-bg: #ffe6ec;
            --final-text: #5c3a45;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            background-color: var(--bg-dark);
            width: 100vw; min-height: 100vh; min-height: 100dvh; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            overflow: hidden; color: var(--text-light);
            font-family: 'Montserrat', sans-serif;
            touch-action: none;
            transition: background-color 3s ease;
        }

        /* --- 1. INITIAL START SCREEN --- */
        #start-screen {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100dvh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 50; cursor: pointer; transition: opacity 1.5s ease;
        }
        
        .start-text {
            font-family: 'Cormorant Garamond', serif; font-size: clamp(1.5rem, 6vw, 2.2rem);
            color: var(--orb-color); font-style: italic; margin-bottom: 30px;
            text-align: center; padding: 0 20px; opacity: 0.8;
        }

        .start-btn {
            border: 1px solid rgba(255, 179, 198, 0.3); padding: 12px 35px; border-radius: 30px;
            font-size: 0.75rem; letter-spacing: 4px; text-transform: uppercase; color: var(--orb-color);
            animation: pulseHint 2s infinite alternate; pointer-events: none;
        }

        /* --- 2. THE GROUNDING ORB --- */
        #hug-container {
            position: relative; width: 100vw; height: 100dvh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 2s ease; z-index: 10;
        }

        .orb-wrapper {
            position: relative; width: clamp(100px, 30vw, 150px); aspect-ratio: 1/1;
            display: flex; justify-content: center; align-items: center;
            margin-bottom: 10vh;
        }

        /* The glowing light source */
        #orb {
            width: 100%; height: 100%; border-radius: 50%;
            background: radial-gradient(circle at 50% 50%, #ffffff 0%, var(--orb-color) 40%, transparent 80%);
            box-shadow: 0 0 40px var(--orb-glow), 0 0 80px rgba(255, 179, 198, 0.2);
            filter: blur(5px);
            transform: scale(1);
            /* Transition is handled dynamically in JS for different breath lengths */
            will-change: transform; 
        }

        /* Floating ambient dust around the orb */
        .dust {
            position: absolute; border-radius: 50%; background: #fff;
            opacity: 0; filter: blur(1px); animation: floatDust 4s infinite ease-in-out alternate;
        }

        /* --- 3. BREATHE TEXT --- */
        #breath-text {
            font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem, 8vw, 3rem);
            color: var(--text-light); font-style: italic; letter-spacing: 2px;
            text-align: center; height: 60px;
            transition: opacity 1s ease; opacity: 0;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        .sub-text {
            position: absolute; bottom: 10vh; font-size: 0.7rem; letter-spacing: 3px;
            text-transform: uppercase; color: rgba(243, 229, 229, 0.5); font-weight: 300;
        }

        /* --- 4. FINAL HUG SCREEN --- */
        #final-screen {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100dvh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background-color: var(--final-bg); z-index: 100;
            opacity: 0; pointer-events: none; transition: opacity 4s ease;
        }

        .final-message {
            font-family: 'Cormorant Garamond', serif; font-size: clamp(1.8rem, 7vw, 2.5rem);
            color: var(--final-text); font-style: italic; text-align: center;
            line-height: 1.6; padding: 0 30px; opacity: 0; transform: translateY(20px);
            transition: opacity 3s ease 1s, transform 3s ease 1s;
        }
        
        .final-message.show { opacity: 1; transform: translateY(0); }

        /* Animations */
        @keyframes pulseHint { 0% { box-shadow: 0 0 10px rgba(255, 179, 198, 0); } 100% { box-shadow: 0 0 20px rgba(255, 179, 198, 0.4); } }
        @keyframes floatDust { 0% { transform: translate(0, 0) scale(0.8); opacity: 0.1; } 100% { transform: translate(var(--dx), var(--dy)) scale(1.5); opacity: 0.6; } }
    </style>
</head>
<body>

    <div id="start-screen">
        <div class="start-text">I'm right here with you.</div>
        <div class="start-btn">Tap to hold my hand</div>
    </div>

    <div id="hug-container">
        <div class="orb-wrapper" id="orb-wrapper">
            <div id="orb"></div>
        </div>
        <div id="breath-text">Match my breathing.</div>
        <div class="sub-text">Focus on the light</div>
    </div>

    <div id="final-screen">
        <div class="final-message" id="final-message">
            Consider this a tight, five-minute-long hug.<br><br>
            Take a deep breath.<br>You are safe, and you are going to be okay.
        </div>
    </div>

    <script>
        // DOM Elements
        const startScreen = document.getElementById('start-screen');
        const hugContainer = document.getElementById('hug-container');
        const orb = document.getElementById('orb');
        const breathText = document.getElementById('breath-text');
        const orbWrapper = document.getElementById('orb-wrapper');
        const finalScreen = document.getElementById('final-screen');
        const finalMessage = document.getElementById('final-message');

        let hapticInterval;

        // Generate ambient floating dust around the orb
        for(let i=0; i<15; i++) {
            let dust = document.createElement('div');
            dust.className = 'dust';
            dust.style.width = dust.style.height = `${Math.random() * 4 + 2}px`;
            dust.style.left = `${Math.random() * 100}%`;
            dust.style.top = `${Math.random() * 100}%`;
            dust.style.animationDelay = `${Math.random() * 2}s`;
            dust.style.setProperty('--dx', `${(Math.random() - 0.5) * 40}px`);
            dust.style.setProperty('--dy', `${(Math.random() - 0.5) * 40}px`);
            orbWrapper.appendChild(dust);
        }

        // --- START THE EXPERIENCE ---
        startScreen.addEventListener('click', () => {
            // Initial gentle haptic feedback
            if(navigator.vibrate) navigator.vibrate([15, 50, 15]);

            startScreen.style.opacity = '0';
            setTimeout(() => {
                startScreen.style.display = 'none';
                hugContainer.style.opacity = '1';
                
                // Show intro text, then start cycle
                breathText.style.opacity = '1';
                setTimeout(() => {
                    breathText.style.opacity = '0';
                    setTimeout(startBreathingCycle, 1000);
                }, 3500);

            }, 1500);
        });

        // --- THE 4-2-6 GROUNDING BREATHING LOGIC ---
        let cyclesCompleted = 0;
        const totalCycles = 3; // 3 full deep breaths

        function startBreathingCycle() {
            if (cyclesCompleted >= totalCycles) {
                triggerFinalHug();
                return;
            }

            // 1. INHALE (4 seconds)
            changeText("Breathe in...");
            orb.style.transition = 'transform 4s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
            orb.style.transform = 'scale(2.8)';
            startHaptics('inhale');

            // 2. HOLD (2 seconds)
            setTimeout(() => {
                changeText("Hold...");
                stopHaptics();
                
                // 3. EXHALE (6 seconds)
                setTimeout(() => {
                    changeText("Breathe out...");
                    orb.style.transition = 'transform 6s cubic-bezier(0.25, 1, 0.5, 1)';
                    orb.style.transform = 'scale(1)';
                    startHaptics('exhale');

                    // 4. REST (1.5 seconds) before next cycle
                    setTimeout(() => {
                        changeText("");
                        stopHaptics();
                        cyclesCompleted++;
                        
                        setTimeout(startBreathingCycle, 1500);

                    }, 6000); // Wait for exhale to finish
                }, 2000); // Wait for hold to finish
            }, 4000); // Wait for inhale to finish
        }

        // --- HAPTIC HEARTBEAT SYNCS WITH BREATHING ---
        function startHaptics(phase) {
            if (!navigator.vibrate) return;
            clearInterval(hapticInterval);

            if (phase === 'inhale') {
                // Quick, uplifting pulses as chest expands
                hapticInterval = setInterval(() => { navigator.vibrate(10); }, 600);
            } else if (phase === 'exhale') {
                // Slower, calming pulses as chest lowers
                hapticInterval = setInterval(() => { navigator.vibrate(15); }, 1000);
            }
        }

        function stopHaptics() {
            clearInterval(hapticInterval);
        }

        // --- SMOOTH TEXT CROSSFADING ---
        function changeText(newText) {
            breathText.style.opacity = '0';
            setTimeout(() => {
                breathText.innerText = newText;
                if(newText !== "") breathText.style.opacity = '1';
            }, 600); // Wait for fade out
        }

        // --- THE FINALE (THE HUG) ---
        function triggerFinalHug() {
            // Orb expands infinitely to swallow the screen
            orb.style.transition = 'transform 4s ease-in';
            orb.style.transform = 'scale(20)';
            
            // Soft, continuous vibration simulating a warm embrace
            if(navigator.vibrate) navigator.vibrate([30, 100, 30, 100, 50, 200, 50]);

            setTimeout(() => {
                finalScreen.style.opacity = '1';
                
                setTimeout(() => {
                    finalMessage.classList.add('show');
                }, 1000);

            }, 2500); // Trigger mid-expansion
        }
    </script>
</body>
</html>
