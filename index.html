<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Timeline ✨</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@200;300;400&family=Space+Mono&display=swap');

        :root {
            --bg-deep: #020102;
            --line-color: #ffcf70;
            --line-glow: rgba(255, 207, 112, 0.6);
            --glitch-red: rgba(255, 0, 60, 0.8);
            --glitch-blue: rgba(0, 200, 255, 0.8);
            --text-light: #f3e5e5;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            background-color: var(--bg-deep);
            width: 100vw; min-height: 100dvh; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            overflow: hidden; color: var(--text-light);
            font-family: 'Montserrat', sans-serif;
            touch-action: none;
        }

        /* --- HARDWARE CANVAS (Particles & Ripples) --- */
        #particle-canvas {
            position: absolute; top: 0; left: 0;
            width: 100vw; height: 100dvh;
            z-index: 1; pointer-events: auto; /* Allows touch for ripples */
        }

        /* --- 3D PARALLAX WRAPPER --- */
        #parallax-wrapper {
            position: relative; width: 100vw; height: 100dvh;
            display: flex; justify-content: center; align-items: center;
            z-index: 5; transition: transform 0.1s ease-out; pointer-events: none;
        }

        /* --- THE SACRED TIMELINE (SVG) --- */
        #timeline-container {
            position: absolute;
            width: 100vw; height: 60vh;
            display: flex; justify-content: center; align-items: center;
        }

        svg { width: 100%; height: 100%; max-width: 500px; overflow: visible; }

        #stable-line {
            stroke: var(--line-color); stroke-width: 2;
            filter: drop-shadow(0 0 8px var(--line-glow));
            transition: stroke-width 1s ease, opacity 1s ease;
            stroke-dasharray: 200 50; animation: flowLine 3s linear infinite;
        }

        .branch-thread {
            fill: none; stroke: var(--line-color);
            stroke-linecap: round; stroke-linejoin: round; opacity: 0;
        }

        .thread-main { stroke-width: 3; filter: drop-shadow(0 0 12px var(--line-glow)); }
        .thread-sub1 { stroke-width: 1.5; filter: drop-shadow(0 0 5px var(--line-glow)); opacity: 0.7; }
        .thread-sub2 { stroke-width: 1; filter: drop-shadow(0 0 3px var(--line-glow)); opacity: 0.5; }

        /* --- THE FINALE REVEAL TEXT (FROSTED FRAME) --- */
        #reveal-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; width: 90%; max-width: 420px;
            opacity: 0; pointer-events: none; z-index: 20;
            
            background: rgba(10, 2, 5, 0.75);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 207, 112, 0.2); border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.9), inset 0 0 30px rgba(255, 207, 112, 0.05);
            transition: opacity 1.5s ease;
        }

        .reveal-title {
            font-family: 'Cormorant Garamond', serif; font-size: clamp(1.8rem, 7vw, 2.5rem);
            color: var(--line-color); font-style: italic; margin-bottom: 15px;
            text-shadow: 0 0 20px var(--line-glow); min-height: 1.2em;
        }

        .reveal-body {
            font-size: clamp(0.9rem, 4vw, 1.1rem); line-height: 1.8;
            color: var(--text-light); font-weight: 300; letter-spacing: 1px; min-height: 5em;
        }
        
        .typewriter-cursor::after {
            content: '|'; animation: blink 1s infinite; color: var(--line-color);
        }

        /* --- THE STATUS MONITOR --- */
        #status-monitor {
            position: absolute; bottom: 8vh; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center;
            opacity: 0.6; transition: opacity 1s ease; z-index: 10; pointer-events: none;
        }

        .clock { font-family: 'Space Mono', monospace; font-size: 1.2rem; color: var(--line-color); letter-spacing: 2px; margin-bottom: 5px; }
        .status-text { font-size: 0.65rem; letter-spacing: 4px; text-transform: uppercase; color: var(--text-light); font-weight: 200; transition: color 0.3s; }

        /* --- ANIMATION PHASE 1: REALITY GLITCH --- */
        .glitching #stable-line { animation: glitchLine 0.2s infinite, flowLine 3s linear infinite; }
        .glitching .clock { color: #ff4d4d; animation: textGlitch 0.3s infinite; }
        .glitching .status-text { color: #ff4d4d; }

        /* --- ANIMATION PHASE 2: BRANCHING SHATTER --- */
        .branching #stable-line { opacity: 0; stroke-width: 0; animation: none; }
        .branching .branch-thread {
            opacity: 1; stroke-dasharray: 100; stroke-dashoffset: 100;
            animation: drawThread 3s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
        }
        .branching #thread-1 { animation-delay: 0s; }
        .branching #thread-2 { animation-delay: 0.3s; }
        .branching #thread-3 { animation-delay: 0.6s; }
        .branching #thread-4 { animation-delay: 0.9s; }
        .branching #status-monitor { opacity: 0; }

        /* --- KEYFRAMES --- */
        @keyframes flowLine { from { stroke-dashoffset: 250; } to { stroke-dashoffset: 0; } }
        @keyframes drawThread { to { stroke-dashoffset: 0; } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        
        /* Chromatic Aberration Glitch Effects */
        @keyframes glitchLine {
            0% { filter: drop-shadow(3px 0 var(--glitch-red)) drop-shadow(-3px 0 var(--glitch-blue)); transform: translateY(1px); }
            20% { filter: drop-shadow(-3px 0 var(--glitch-red)) drop-shadow(3px 0 var(--glitch-blue)); transform: translateY(-1px); }
            40% { filter: drop-shadow(2px 2px var(--glitch-red)) drop-shadow(-2px -2px var(--glitch-blue)); transform: translateY(2px); }
            60% { filter: drop-shadow(-2px -2px var(--glitch-red)) drop-shadow(2px 2px var(--glitch-blue)); transform: translateY(-2px); }
            80% { filter: drop-shadow(4px 0 var(--glitch-red)) drop-shadow(-4px 0 var(--glitch-blue)); transform: translateY(1px); }
            100% { filter: drop-shadow(-1px 0 var(--glitch-red)) drop-shadow(1px 0 var(--glitch-blue)); transform: translateY(0); }
        }
        @keyframes textGlitch {
            0% { transform: translate(1px, 1px); } 25% { transform: translate(-1px, -1px); }
            50% { transform: translate(2px, 0); } 75% { transform: translate(-2px, 1px); } 100% { transform: translate(0, -1px); }
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div id="parallax-wrapper">
        <div id="timeline-container">
            <svg viewBox="0 0 200 200" preserveAspectRatio="xMidYMid meet">
                <line id="stable-line" x1="-50" y1="100" x2="250" y2="100" />
                <g transform="translate(0, 15)">
                    <path id="thread-1" class="branch-thread thread-main" pathLength="100"
                          d="M 100 160 C 100 160 20 90 20 50 C 20 20 60 10 100 40 C 140 10 180 20 180 50 C 180 90 100 160 100 160 Z" />
                    <path id="thread-2" class="branch-thread thread-sub1" pathLength="100"
                          d="M 100 160 C 80 130 35 90 35 55 C 35 30 65 20 100 45" />
                    <path id="thread-3" class="branch-thread thread-sub1" pathLength="100"
                          d="M 100 160 C 120 130 165 90 165 55 C 165 30 135 20 100 45" />
                    <path id="thread-4" class="branch-thread thread-sub2" pathLength="100"
                          d="M 0 100 C 40 80 70 140 100 160 C 130 140 160 80 200 100" />
                </g>
            </svg>

            <div id="reveal-text">
                <h1 class="reveal-title" id="type-title"></h1>
                <div style="width: 40px; height: 1px; background: var(--line-color); margin: 0 auto 20px auto; box-shadow: 0 0 10px var(--line-color);"></div>
                <p class="reveal-body" id="type-body"></p>
            </div>
        </div>
    </div>

    <div id="status-monitor">
        <div class="clock" id="clock-display">--:--:--</div>
        <div class="status-text" id="status-text">Timeline Stable</div>
    </div>

    <script>
        // ==========================================
        // ⏰ DETONATION TIME (24hr format)
        // Set to current time + 1 min to test!
        // ==========================================
        const TARGET_HOUR = 16;
        const TARGET_MINUTE = 30;

        const clockDisplay = document.getElementById('clock-display');
        const statusText = document.getElementById('status-text');
        const parallaxWrapper = document.getElementById('parallax-wrapper');
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        const revealText = document.getElementById('reveal-text');
        
        let currentState = 'stable'; 
        let particles = [];
        let ripples = [];
        let cw = canvas.width = window.innerWidth;
        let ch = canvas.height = window.innerHeight;
        let heartbeatInterval;

        window.addEventListener('resize', () => { cw = canvas.width = window.innerWidth; ch = canvas.height = window.innerHeight; });

        // --- 1. TIMELINE LOGIC ---
        function updateClock() {
            if (currentState === 'detonated') return;

            const now = new Date();
            const h = now.getHours();
            const m = now.getMinutes();
            const s = now.getSeconds();

            clockDisplay.innerText = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;

            const currentTotalMins = (h * 60) + m;
            const targetTotalMins = (TARGET_HOUR * 60) + TARGET_MINUTE;
            const minutesLeft = targetTotalMins - currentTotalMins;

            if (minutesLeft === 1 && currentState === 'stable') triggerGlitch();
            else if (minutesLeft <= 0 && currentState !== 'detonated') triggerDetonation();
        }

        function triggerGlitch() {
            currentState = 'glitching'; document.body.classList.add('glitching');
            statusText.innerText = "ANOMALY DETECTED";
            setInterval(() => {
                if(currentState !== 'glitching') return;
                const texts = ["CRITICAL ERROR", "ANOMALY DETECTED", "REALITY SHIFTING", "TIMELINE UNSTABLE"];
                statusText.innerText = texts[Math.floor(Math.random() * texts.length)];
                if(navigator.vibrate && Math.random() > 0.7) navigator.vibrate(10);
            }, 800);
        }

        function triggerDetonation() {
            currentState = 'detonated';
            document.body.classList.remove('glitching'); document.body.classList.add('branching');
            statusText.innerText = "MULTIVERSE FRACTURE";
            
            if (navigator.vibrate) navigator.vibrate([100, 50, 400, 100, 800]); 
            
            createShatterParticles();
            requestAnimationFrame(animateCanvas);

            // Wait for heart to draw, then trigger Typewriter & Heartbeat
            setTimeout(() => {
                revealText.style.opacity = '1';
                startTypewriter();
                startHeartbeat();
            }, 3500);
        }

        updateClock(); setInterval(updateClock, 1000);

        // --- 2. QUANTUM TYPEWRITER ---
        const titleText = "Timeline Branch Detected";
        const bodyText = "4:30 pm… That’s when someone really special came into this world. I don’t know what the world gained that moment… but I know what I gained when you came into my life. Happy Birthday, ammu 🤍\n\nHappy Birthday, Ammu.\nI love you always💗.";
        
        function startTypewriter() {
            const titleEl = document.getElementById('type-title');
            const bodyEl = document.getElementById('type-body');
            let tIdx = 0, bIdx = 0;

            titleEl.classList.add('typewriter-cursor');
            
            function typeTitle() {
                if (tIdx < titleText.length) {
                    titleEl.innerHTML = titleText.substring(0, tIdx + 1);
                    tIdx++;
                    if(navigator.vibrate && tIdx % 2 === 0) navigator.vibrate(5); // Tiny typing clicks
                    setTimeout(typeTitle, 40);
                } else {
                    titleEl.classList.remove('typewriter-cursor');
                    bodyEl.classList.add('typewriter-cursor');
                    setTimeout(typeBody, 400);
                }
            }

            function typeBody() {
                if (bIdx < bodyText.length) {
                    // Replace \n with actual HTML line breaks
                    let currentText = bodyText.substring(0, bIdx + 1).replace(/\n/g, '<br>');
                    bodyEl.innerHTML = currentText;
                    bIdx++;
                    setTimeout(typeBody, 35);
                } else {
                    bodyEl.classList.remove('typewriter-cursor'); // Done typing
                }
            }
            typeTitle();
        }

        // --- 3. HAPTIC HEARTBEAT ---
        function startHeartbeat() {
            if (!navigator.vibrate) return;
            // A gentle thump-thump every 2 seconds
            heartbeatInterval = setInterval(() => {
                navigator.vibrate([30, 150, 40]);
            }, 2000);
        }

        // --- 4. MULTIVERSE SHATTER & TOUCH RIPPLES ---
        function createShatterParticles() {
            const cx = cw / 2; const cy = ch / 2;
            for (let i = 0; i < 180; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = (Math.random() * 12 + 3) * (Math.abs(Math.cos(angle)) + 0.5); 
                particles.push({
                    x: cx, y: cy,
                    vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                    r: Math.random() * 2 + 0.5, life: 1, decay: Math.random() * 0.01 + 0.003,
                    color: Math.random() > 0.5 ? '#ffcf70' : '#ffffff' 
                });
            }
        }

        // Listen for touches to create Spacetime Ripples
        canvas.addEventListener('pointerdown', (e) => {
            if (currentState !== 'detonated') return;
            const x = e.clientX || e.touches[0].clientX;
            const y = e.clientY || e.touches[0].clientY;
            
            ripples.push({ x: x, y: y, radius: 0, maxRadius: 150, alpha: 0.8 });
            if (navigator.vibrate) navigator.vibrate(15);
        });

        function animateCanvas() {
            if (currentState !== 'detonated') return;
            ctx.clearRect(0, 0, cw, ch);
            let activeRender = false;

            // Draw & Update Ripples
            for (let i = ripples.length - 1; i >= 0; i--) {
                let r = ripples[i];
                r.radius += 5; // Ripple expansion speed
                r.alpha -= 0.03;
                
                if (r.alpha <= 0) { ripples.splice(i, 1); continue; }
                activeRender = true;

                ctx.beginPath(); ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(255, 207, 112, ${r.alpha})`;
                ctx.lineWidth = 2; ctx.stroke();
            }

            // Update Particles with Ripple Physics
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                if (p.life > 0) {
                    activeRender = true;
                    
                    // Ripple Force Repulsion
                    ripples.forEach(r => {
                        const dx = p.x - r.x; const dy = p.y - r.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        // If particle is near the expanding ripple edge, push it outward
                        if (Math.abs(dist - r.radius) < 20) {
                            p.vx += (dx / dist) * 1.5;
                            p.vy += (dy / dist) * 1.5;
                        }
                    });

                    p.x += p.vx; p.y += p.vy;
                    p.vx *= 0.94; p.vy *= 0.94; p.vy += 0.15; // Friction & Gravity
                    p.life -= p.decay;

                    ctx.globalAlpha = Math.max(0, p.life);
                    ctx.fillStyle = p.color;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
                    ctx.shadowBlur = 10; ctx.shadowColor = p.color;
                }
            }

            if (activeRender || particles.some(p => p.life > 0)) {
                requestAnimationFrame(animateCanvas);
            }
        }

        // --- 5. 3D GYROSCOPIC PARALLAX ---
        let currentTiltX = 0; let currentTiltY = 0;
        window.addEventListener('deviceorientation', (e) => {
            if (!e.gamma || !e.beta || currentState !== 'detonated') return; 
            let targetX = Math.max(-20, Math.min(20, e.gamma));
            let targetY = Math.max(-20, Math.min(20, e.beta - 45));
            currentTiltX += (targetX - currentTiltX) * 0.1;
            currentTiltY += (targetY - currentTiltY) * 0.1;
            parallaxWrapper.style.transform = `translate(${currentTiltX * 1.5}px, ${currentTiltY * 1.5}px)`;
        });

        // --- SECRET MANUAL OVERRIDE ---
        let tapCount = 0;
        statusText.addEventListener('click', () => {
            tapCount++; if (tapCount >= 3 && currentState === 'stable') triggerDetonation();
        });
    </script>
</body>
</html>
